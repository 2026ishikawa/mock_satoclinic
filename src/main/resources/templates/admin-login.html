<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理者ログイン | 佐藤クリニック</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="sc-admin-login-page">
    <main class="sc-admin-login-content">
      <section class="sc-admin-login-card">
        <h1 class="sc-admin-login-title">管理者ログイン</h1>
        <p class="sc-admin-login-lead">予約管理画面を開くには、<br />管理者アカウントでログインしてください。</p>
        <div class="sc-admin-login-credentials">
          <p class="sc-admin-login-credentials-title">開発用ログイン情報</p>
          <p>ユーザー名: <strong>admin</strong></p>
          <p>パスワード: <strong>admin123</strong></p>
        </div>

        <p th:if="${hasError}" class="sc-admin-login-alert is-error">ユーザー名またはパスワードが正しくありません。</p>
        <p th:if="${loggedOut}" class="sc-admin-login-alert is-success">ログアウトしました。</p>

        <form th:action="@{/admin/login}" method="post" class="sc-admin-login-form">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <label class="sc-admin-login-label">
            ユーザー名
            <input type="text" name="username" autocomplete="username" required />
          </label>
          <label class="sc-admin-login-label">
            パスワード
            <input type="password" name="password" autocomplete="current-password" required />
          </label>
          <button type="submit" class="sc-admin-login-button">ログイン</button>
        </form>
      </section>
    </main>
  </body>
</html>
