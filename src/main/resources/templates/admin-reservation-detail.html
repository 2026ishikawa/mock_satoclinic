<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>予約詳細 | 佐藤医院</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="sc-admin-reservations-page">
    <div th:if="${message}" class="sc-admin-reservations-toast-backdrop" id="adminReservationToast" onclick="closeAdminReservationToast()">
      <div class="sc-admin-reservations-toast" onclick="event.stopPropagation()">
        <button type="button" class="sc-admin-reservations-toast-close" aria-label="メッセージを閉じる" onclick="closeAdminReservationToast()">×</button>
        <p class="sc-admin-reservations-toast-text" th:text="${message}"></p>
      </div>
    </div>

    <div
      th:if="${reservation != null and !reservation.deleted and reservation.status == 'RESERVED'}"
      class="sc-admin-reservations-modal-backdrop is-hidden"
      id="cancelReasonModal"
      onclick="closeCancelReasonModal()"
    >
      <div class="sc-admin-reservations-modal" onclick="event.stopPropagation()">
        <div class="sc-admin-reservations-modal-header">
          <h2 class="sc-admin-reservations-modal-title">キャンセル理由を選択</h2>
          <button type="button" class="sc-admin-reservations-modal-close" aria-label="モーダルを閉じる" onclick="closeCancelReasonModal()">×</button>
        </div>
        <p class="sc-admin-reservations-modal-lead">理由を選択してから、キャンセルを確定してください。</p>
        <form
          th:action="@{/admin/reservations/{id}/cancel(id=${reservation.id})}"
          method="post"
          class="sc-admin-reservations-modal-form"
          onsubmit="return confirm('この内容でキャンセルしますか？');"
        >
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <label class="sc-admin-reservations-inline-label">
            キャンセル理由
            <select name="cancelReason" class="sc-admin-reservations-inline-select" required>
              <option value="">選択してください</option>
              <option th:each="option : ${cancelReasonOptions.entrySet()}" th:value="${option.key}" th:text="${option.value}"></option>
            </select>
          </label>
          <div class="sc-admin-reservations-modal-actions">
            <button type="button" class="sc-admin-reservations-reset" onclick="closeCancelReasonModal()">閉じる</button>
            <button type="submit" class="sc-admin-reservations-cancel">この内容でキャンセル</button>
          </div>
        </form>
      </div>
    </div>

    <div
      th:if="${reservation != null and !reservation.deleted}"
      class="sc-admin-reservations-modal-backdrop is-hidden"
      id="deleteReasonModal"
      onclick="closeDeleteReasonModal()"
    >
      <div class="sc-admin-reservations-modal" onclick="event.stopPropagation()">
        <div class="sc-admin-reservations-modal-header">
          <h2 class="sc-admin-reservations-modal-title">削除理由を入力</h2>
          <button type="button" class="sc-admin-reservations-modal-close" aria-label="モーダルを閉じる" onclick="closeDeleteReasonModal()">×</button>
        </div>
        <p class="sc-admin-reservations-modal-lead">論理削除として非表示化します。復元できるよう、理由を必ず記録してください。</p>
        <form
          th:action="@{/admin/reservations/{id}/delete(id=${reservation.id})}"
          method="post"
          class="sc-admin-reservations-modal-form"
          onsubmit="return confirm('この予約データを削除済みにしますか？');"
        >
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <label class="sc-admin-reservations-inline-label">
            削除理由
            <textarea name="deleteReason" class="sc-admin-reservations-inline-textarea" rows="4" maxlength="255" required></textarea>
          </label>
          <div class="sc-admin-reservations-modal-actions">
            <button type="button" class="sc-admin-reservations-reset" onclick="closeDeleteReasonModal()">閉じる</button>
            <button type="submit" class="sc-admin-reservations-delete">削除済みにする</button>
          </div>
        </form>
      </div>
    </div>

    <main class="sc-admin-reservations-content">
      <div class="sc-admin-reservations-header">
        <div class="sc-admin-reservations-header-row">
          <h1>予約詳細</h1>
          <form th:action="@{/admin/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="sc-admin-reservations-logout">ログアウト</button>
          </form>
        </div>
      </div>

      <div th:if="${reservation == null}" class="sc-admin-reservations-empty">
        指定した予約データは見つかりません。
      </div>

      <div th:if="${reservation != null}">
        <table class="sc-admin-reservations-table">
          <tbody>
            <tr><th>予約番号</th><td th:text="${reservation.reservationCode}"></td></tr>
            <tr><th>患者名</th><td th:text="${reservation.patientName}"></td></tr>
            <tr><th>フリガナ</th><td th:text="${reservation.patientKana}"></td></tr>
            <tr><th>生年月日</th><td th:text="${reservation.birthDate}"></td></tr>
            <tr><th>電話番号</th><td th:text="${reservation.phoneNumber}"></td></tr>
            <tr><th>メールアドレス</th><td th:text="${reservation.email}"></td></tr>
            <tr><th>初診/再診</th><td th:text="${reservation.visitType == 'FIRST' ? '初診' : '再診'}"></td></tr>
            <tr><th>予約日</th><td th:text="${reservation.reservationDate}"></td></tr>
            <tr><th>予約時間</th><td th:text="${reservation.reservationTime}"></td></tr>
            <tr><th>症状</th><td th:text="${reservation.symptom}"></td></tr>
            <tr>
              <th>状態</th>
              <td>
                <span
                  class="sc-admin-reservations-status-badge"
                  th:classappend="${reservation.deleted ? ' is-deleted' : (reservation.status == 'RESERVED' ? ' is-reserved' : (reservation.status == 'VISITED' ? ' is-visited' : ' is-cancelled'))}"
                  th:text="${reservation.deleted ? '削除済み' : reservation.status}"
                ></span>
              </td>
            </tr>
            <tr th:if="${reservation.status == 'CANCELLED' and reservation.cancelReason != null}">
              <th>キャンセル理由</th>
              <td th:text="${cancelReasonOptions[reservation.cancelReason]}"></td>
            </tr>
            <tr th:if="${reservation.deleted}">
              <th>削除日時</th>
              <td th:text="${#temporals.format(reservation.deletedAt, 'yyyy-MM-dd HH:mm')}"></td>
            </tr>
            <tr th:if="${reservation.deleted}">
              <th>削除操作管理者</th>
              <td th:text="${reservation.deletedBy}"></td>
            </tr>
            <tr th:if="${reservation.deleted}">
              <th>削除理由</th>
              <td th:text="${reservation.deleteReason}"></td>
            </tr>
          </tbody>
        </table>

        <div class="sc-admin-reservations-actions">
          <a
            th:href="${includeDeleted} ? @{/admin/reservations(includeDeleted=${includeDeleted})} : @{/admin/reservations}"
            class="sc-admin-reservations-link"
          >
            一覧へ戻る
          </a>

          <form th:if="${!reservation.deleted and reservation.status == 'RESERVED'}" th:action="@{/admin/reservations/{id}/visit(id=${reservation.id})}" method="post" onsubmit="return confirm('本当に来院済みに変更しますか？');">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="sc-admin-reservations-visit">来院済みにする</button>
          </form>

          <button th:if="${!reservation.deleted and reservation.status == 'RESERVED'}" type="button" class="sc-admin-reservations-cancel" onclick="openCancelReasonModal()">
            キャンセルする
          </button>

          <form th:if="${!reservation.deleted and (reservation.status == 'VISITED' or reservation.status == 'CANCELLED')}" th:action="@{/admin/reservations/{id}/restore(id=${reservation.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="sc-admin-reservations-restore">予約済みに戻す</button>
          </form>

          <button th:if="${!reservation.deleted}" type="button" class="sc-admin-reservations-delete" onclick="openDeleteReasonModal()">
            削除する
          </button>

          <form th:if="${reservation.deleted}" th:action="@{/admin/reservations/{id}/restore-deleted(id=${reservation.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="sc-admin-reservations-restore">削除を取り消す</button>
          </form>
        </div>
      </div>
    </main>
    <script>
      function closeAdminReservationToast() {
        const toast = document.getElementById("adminReservationToast");
        if (toast) {
          toast.remove();
        }
      }

      function openCancelReasonModal() {
        const modal = document.getElementById("cancelReasonModal");
        if (modal) {
          modal.classList.remove("is-hidden");
        }
      }

      function closeCancelReasonModal() {
        const modal = document.getElementById("cancelReasonModal");
        if (modal) {
          modal.classList.add("is-hidden");
        }
      }

      function openDeleteReasonModal() {
        const modal = document.getElementById("deleteReasonModal");
        if (modal) {
          modal.classList.remove("is-hidden");
        }
      }

      function closeDeleteReasonModal() {
        const modal = document.getElementById("deleteReasonModal");
        if (modal) {
          modal.classList.add("is-hidden");
        }
      }

      window.setTimeout(closeAdminReservationToast, 3000);
    </script>
  </body>
</html>
