<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>予約一覧 | 佐藤クリニック</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="sc-admin-reservations-page">
    <main class="sc-admin-reservations-content">
      <div class="sc-admin-reservations-header">
        <div class="sc-admin-reservations-header-row">
          <div>
            <h1>予約一覧</h1>
            <p>予約日・時間順で表示します。同じ時間帯は作成順です。</p>
          </div>
          <form th:action="@{/admin/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="sc-admin-reservations-logout">ログアウト</button>
          </form>
        </div>
      </div>

      <form class="sc-admin-reservations-filter" th:action="@{/admin/reservations}" method="get">
        <label>
          予約日
          <input type="date" name="date" th:value="${selectedDate}" />
        </label>
        <label>
          ステータス
          <select name="status">
            <option value="">すべて</option>
            <option th:each="status : ${statusOptions}" th:value="${status}" th:text="${status}" th:selected="${status == selectedStatus}"></option>
          </select>
        </label>
        <label>
          患者名
          <input type="text" name="patientName" th:value="${selectedPatientName}" placeholder="例: 佐藤" />
        </label>
        <label>
          予約番号
          <input type="text" name="reservationCode" th:value="${selectedReservationCode}" placeholder="例: R2026" />
        </label>
        <label>
          電話番号
          <input type="text" name="phoneNumber" th:value="${selectedPhoneNumber}" placeholder="例: 0901234" />
        </label>
        <div class="sc-admin-reservations-filter-actions">
          <button type="submit">検索</button>
          <a th:href="@{/admin/reservations}" class="sc-admin-reservations-reset">リセット</a>
        </div>
      </form>

      <table class="sc-admin-reservations-table">
        <thead>
          <tr>
            <th>予約番号</th>
            <th>患者名</th>
            <th>予約日</th>
            <th>時間</th>
            <th>初診/再診</th>
            <th>ステータス</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(reservations)}">
            <td colspan="7">該当する予約はありません。</td>
          </tr>
          <tr th:each="reservation : ${reservations}">
            <td th:text="${reservation.reservationCode}"></td>
            <td th:text="${reservation.patientName}"></td>
            <td th:text="${reservation.reservationDate}"></td>
            <td th:text="${reservation.reservationTime}"></td>
            <td th:text="${reservation.visitType == 'FIRST' ? '初診' : '再診'}"></td>
            <td>
              <span
                class="sc-admin-reservations-status-badge"
                th:classappend="${reservation.status == 'RESERVED' ? ' is-reserved' : (reservation.status == 'VISITED' ? ' is-visited' : ' is-cancelled')}"
                th:text="${reservation.status}"
              ></span>
            </td>
            <td><a th:href="@{/admin/reservations/{id}(id=${reservation.id})}">詳細</a></td>
          </tr>
        </tbody>
      </table>
    </main>
  </body>
</html>
