<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>予約確認 | 佐藤医院</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
<body class="sc-reservation-confirm-page">
  <nav class="sc-resv-progress" aria-label="予約手続きの進行状況">
    <ol class="sc-resv-progress-list">
      <li class="sc-resv-progress-item">
        <span class="sc-resv-progress-step">1</span>
        <span>入力</span>
      </li>
      <li class="sc-resv-progress-sep" aria-hidden="true"></li>
      <li class="sc-resv-progress-item is-active">
        <span class="sc-resv-progress-step">2</span>
        <span>確認</span>
      </li>
      <li class="sc-resv-progress-sep" aria-hidden="true"></li>
      <li class="sc-resv-progress-item">
        <span class="sc-resv-progress-step">3</span>
        <span>完了</span>
      </li>
    </ol>
  </nav>
    <main class="sc-reservation-confirm-content">
      <div class="sc-reservation-confirm-header">
        <h1>予約確認</h1>
        <p>入力内容をご確認ください。</p>
      </div>
      <table class="sc-reservation-confirm-table">
        <tr><th>氏名</th><td th:text="${reservationForm.patientName}"></td></tr>
        <tr><th>フリガナ</th><td th:text="${reservationForm.patientKana}"></td></tr>
        <tr><th>生年月日</th><td th:text="${reservationForm.birthDate}"></td></tr>
        <tr><th>電話番号</th><td th:text="${reservationForm.phoneNumber}"></td></tr>
        <tr><th>メールアドレス</th><td th:text="${reservationForm.email}"></td></tr>
        <tr><th>初診/再診</th><td th:text="${reservationForm.visitType == 'FIRST' ? '初診' : '再診'}"></td></tr>
        <tr><th>診療希望日</th><td th:text="${reservationForm.reservationDate}"></td></tr>
        <tr><th>希望時間</th><td th:text="${reservationForm.reservationTime}"></td></tr>
        <tr><th>症状</th><td th:text="${reservationForm.symptom}"></td></tr>
      </table>

      <div class="sc-reservation-confirm-actions">
        <form th:action="@{/reservations}" th:object="${reservationForm}" method="post">
          <input type="hidden" th:field="*{patientName}" />
          <input type="hidden" th:field="*{patientKana}" />
          <input type="hidden" th:field="*{birthYear}" />
          <input type="hidden" th:field="*{birthMonth}" />
          <input type="hidden" th:field="*{birthDay}" />
          <input type="hidden" th:field="*{birthDate}" />
          <input type="hidden" th:field="*{phoneNumber}" />
          <input type="hidden" th:field="*{email}" />
          <input type="hidden" th:field="*{visitType}" />
          <input type="hidden" th:field="*{reservationDate}" />
          <input type="hidden" th:field="*{reservationTime}" />
          <input type="hidden" th:field="*{symptom}" />
          <input type="hidden" th:field="*{agreedToPrivacyPolicy}" />
          <button type="submit" class="sc-reservation-confirm-button sc-reservation-confirm-button-primary">登録する</button>
        </form>

        <form th:action="@{/reservations/new}" th:object="${reservationForm}" method="post">
          <input type="hidden" th:field="*{patientName}" />
          <input type="hidden" th:field="*{patientKana}" />
          <input type="hidden" th:field="*{birthYear}" />
          <input type="hidden" th:field="*{birthMonth}" />
          <input type="hidden" th:field="*{birthDay}" />
          <input type="hidden" th:field="*{birthDate}" />
          <input type="hidden" th:field="*{phoneNumber}" />
          <input type="hidden" th:field="*{email}" />
          <input type="hidden" th:field="*{visitType}" />
          <input type="hidden" th:field="*{reservationDate}" />
          <input type="hidden" th:field="*{reservationTime}" />
          <input type="hidden" th:field="*{symptom}" />
          <input type="hidden" th:field="*{agreedToPrivacyPolicy}" />
          <button type="submit" class="sc-reservation-confirm-button sc-reservation-confirm-button-secondary">修正する</button>
        </form>
      </div>
</main>
  </body>
</html>
