<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>予約確認 | 佐藤医院</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main style="max-width:900px;margin:48px auto;padding:24px;">
      <h1>予約確認</h1>
      <p>入力内容をご確認ください。</p>
      <table style="width:100%;border-collapse:collapse;">
        <tr><th style="text-align:left;padding:10px;border-bottom:1px solid #ddd;">氏名</th><td style="padding:10px;border-bottom:1px solid #ddd;" th:text="${reservationForm.patientName}"></td></tr>
        <tr><th style="text-align:left;padding:10px;border-bottom:1px solid #ddd;">フリガナ</th><td style="padding:10px;border-bottom:1px solid #ddd;" th:text="${reservationForm.patientKana}"></td></tr>
        <tr><th style="text-align:left;padding:10px;border-bottom:1px solid #ddd;">生年月日</th><td style="padding:10px;border-bottom:1px solid #ddd;" th:text="${reservationForm.birthDate}"></td></tr>
        <tr><th style="text-align:left;padding:10px;border-bottom:1px solid #ddd;">電話番号</th><td style="padding:10px;border-bottom:1px solid #ddd;" th:text="${reservationForm.phoneNumber}"></td></tr>
        <tr><th style="text-align:left;padding:10px;border-bottom:1px solid #ddd;">メールアドレス</th><td style="padding:10px;border-bottom:1px solid #ddd;" th:text="${reservationForm.email}"></td></tr>
        <tr><th style="text-align:left;padding:10px;border-bottom:1px solid #ddd;">初診/再診</th><td style="padding:10px;border-bottom:1px solid #ddd;" th:text="${reservationForm.visitType}"></td></tr>
        <tr><th style="text-align:left;padding:10px;border-bottom:1px solid #ddd;">診療希望日</th><td style="padding:10px;border-bottom:1px solid #ddd;" th:text="${reservationForm.reservationDate}"></td></tr>
        <tr><th style="text-align:left;padding:10px;border-bottom:1px solid #ddd;">希望時間</th><td style="padding:10px;border-bottom:1px solid #ddd;" th:text="${reservationForm.reservationTime}"></td></tr>
        <tr><th style="text-align:left;padding:10px;border-bottom:1px solid #ddd;">症状</th><td style="padding:10px;border-bottom:1px solid #ddd;" th:text="${reservationForm.symptom}"></td></tr>
      </table>
      <p style="margin-top:24px;"><a href="/reservations/new">入力画面に戻る</a></p>
    </main>
  </body>
</html>
