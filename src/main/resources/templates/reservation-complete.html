<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>予約完了 | 佐藤医院</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
<body>
  <nav class="sc-resv-progress" aria-label="予約手続きの進行状況">
    <ol class="sc-resv-progress-list">
      <li class="sc-resv-progress-item">
        <span class="sc-resv-progress-step">1</span>
        <span>入力</span>
      </li>
      <li class="sc-resv-progress-sep" aria-hidden="true"></li>
      <li class="sc-resv-progress-item">
        <span class="sc-resv-progress-step">2</span>
        <span>確認</span>
      </li>
      <li class="sc-resv-progress-sep" aria-hidden="true"></li>
      <li class="sc-resv-progress-item is-active">
        <span class="sc-resv-progress-step">3</span>
        <span>完了</span>
      </li>
    </ol>
  </nav>
    <main style="max-width:900px;margin:30px auto;padding:24px;">
      <section style="text-align:center;">
        <h1 style="margin:0 0 16px;color:#0f2f9f;font-size:36px;font-weight:700;">ご予約ありがとうございます</h1>
        <p style="margin:0 0 24px;font-size:17px;">
          受付完了のお知らせを送信いたしましたので、必ずご確認ください
        </p>

        <div style="max-width:560px;margin:0 auto 18px;background:#e0e0e0;border-radius:2px;padding:28px 20px;">
          <p style="margin:0 0 12px;font-size:28px;font-weight:700;">予約番号</p>
          <p style="margin:0 0 16px;font-size:36px;font-weight:700;color:#d80000;" th:text="${reservationCode}"></p>
          <p style="margin:0;font-size:18px;">お問い合わせに必要な番号です。大切に保管ください。</p>
        </div>
      </section>

      <p style="margin:6px 0 18px;text-align:center;">
        <span style="font-weight:700;font-size:20px;">予約日時:</span>
        <span style="font-size:22px;font-weight:700;" th:text="${reservationDate}"></span>
        <span style="font-size:22px;font-weight:700;margin-left:12px;" th:text="${reservationTime}"></span>
      </p>

      <p style="margin-top:24px;text-align:center;">
        <a
          href="/"
          style="display:inline-block;padding:10px 16px;border:1px solid #b8c4d3;border-radius:8px;background:#fff;color:#1f3b57;text-decoration:none;font-weight:700;"
        >
          ← トップページへ戻る
        </a>
      </p>
</main>
  </body>
</html>
