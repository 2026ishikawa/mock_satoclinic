<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>予約完了 | 佐藤医院</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
<body class="sc-reservation-complete-page">
  <nav class="sc-resv-progress" aria-label="予約手続きの進行状況">
    <ol class="sc-resv-progress-list">
      <li class="sc-resv-progress-item">
        <span class="sc-resv-progress-step">1</span>
        <span>入力</span>
      </li>
      <li class="sc-resv-progress-sep" aria-hidden="true"></li>
      <li class="sc-resv-progress-item">
        <span class="sc-resv-progress-step">2</span>
        <span>確認</span>
      </li>
      <li class="sc-resv-progress-sep" aria-hidden="true"></li>
      <li class="sc-resv-progress-item is-active">
        <span class="sc-resv-progress-step">3</span>
        <span>完了</span>
      </li>
    </ol>
  </nav>
    <main class="sc-reservation-complete-content">
      <section class="sc-reservation-complete-header">
        <h1 class="sc-reservation-complete-title">ご予約ありがとうございます</h1>
        <p class="sc-reservation-complete-lead">
          受付完了のお知らせを送信いたしましたので、必ずご確認ください
        </p>

        <div class="sc-reservation-complete-code-box">
          <p class="sc-reservation-complete-code-label">予約番号</p>
          <p class="sc-reservation-complete-code-value" th:text="${reservationCode}"></p>
          <p class="sc-reservation-complete-code-note">お問い合わせに必要な番号です。大切に保管ください。</p>
        </div>
      </section>

      <p class="sc-reservation-complete-datetime">
        <span class="sc-reservation-complete-datetime-label">予約日時:</span>
        <span class="sc-reservation-complete-datetime-value" th:text="${reservationDate}"></span>
        <span class="sc-reservation-complete-datetime-value sc-reservation-complete-datetime-time" th:text="${reservationTime}"></span>
      </p>

      <p class="sc-reservation-complete-back">
        <a
          href="/"
          class="sc-reservation-complete-back-link"
        >
          ← トップページへ戻る
        </a>
      </p>
</main>
  </body>
</html>
