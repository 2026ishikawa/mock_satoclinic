<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>予約完了 | 佐藤医院</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main style="max-width:900px;margin:48px auto;padding:24px;">
      <h1>予約完了</h1>
      <p>予約を受け付けました。</p>
      <p>予約番号: <strong th:text="${reservationCode}"></strong></p>
      <p>
        予約日時:
        <span th:text="${reservationForm.reservationDate}"></span>
        <span th:text="${reservationForm.reservationTime}"></span>
      </p>
      <p style="margin-top:24px;"><a href="/">トップへ戻る</a></p>
    </main>
  </body>
</html>
